<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legisly Labs - Complete Wireframes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: { 50:'#FFFEF9',100:'#FFF8F0',200:'#FFF3E0',300:'#FFE8C7',400:'#FFDDA0',500:'#FFD080' },
            navy: { 500:'#2D4A6A',600:'#2A3F5A',700:'#22354D',800:'#1A2840',900:'#121D30',950:'#0C1420' },
            warm: { 800:'#1E2235',900:'#16192A',950:'#111420' },
            gold: { 200:'#FFE5A0',300:'#FFD97D',400:'#FFC94D',500:'#EDAE49',600:'#D4940A' },
            coral: { 200:'#FFB5A8',300:'#FF9A8B',400:'#FF8A80',500:'#FF6B6B',600:'#E85555' },
            sage: { 200:'#C8ECD8',300:'#B8E0C8',400:'#A8D5BA',500:'#7CB892',600:'#5EA075' },
            violet: { 200:'#C9B8FF',300:'#B4A0FF',400:'#9B82FC',500:'#8B5CF6',600:'#7C3AED' },
            sky: { 400:'#38BDF8',500:'#0EA5E9',600:'#0284C7' },
            ember: { 400:'#FFB347',500:'#FF9F1C',600:'#E8890C' },
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@600;700;800&display=swap');
    body { font-family: 'DM Sans', sans-serif; }
    .font-display { font-family: 'Fraunces', serif; }
    @keyframes ping { 75%,100% { transform:scale(2); opacity:0; } }
    .anim-ping { animation: ping 1s cubic-bezier(0,0,0.2,1) infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }
    .anim-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes slideIn { from { transform:translateX(100%); } to { transform:translateX(0); } }
    .slide-in { animation: slideIn 0.3s ease-out forwards; }
    @keyframes barGrow { from { width:0; } }
    .bar-grow { animation: barGrow 0.8s ease-out forwards; }
    @keyframes warmGlow { 0%,100% { box-shadow: 0 0 15px rgba(237,174,73,0.15); } 50% { box-shadow: 0 0 25px rgba(237,174,73,0.3); } }
    .warm-glow { animation: warmGlow 3s ease-in-out infinite; }
    @keyframes aiPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(237,174,73,0.4); } 50% { box-shadow: 0 0 0 12px rgba(237,174,73,0); } }
    .ai-pulse { animation: aiPulse 2.5s ease-in-out infinite; }
    @keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }
    .shimmer-bg { background:linear-gradient(90deg,transparent,rgba(255,217,125,0.08),transparent); background-size:200% 100%; animation:shimmer 3s infinite; }
    @media (max-width: 768px) {
      body { -webkit-text-size-adjust: 100%; }
      button, [role="button"] { min-height: 36px; }
      .warm-glow { animation: none; }
      .ai-pulse { animation: none; }
    }
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(237,174,73,0.3); border-radius:3px; }
    .dark ::-webkit-scrollbar-thumb { background:rgba(237,174,73,0.3); }
    .light ::-webkit-scrollbar-thumb { background:rgba(13,27,42,0.2); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

const App = () => {
  const [dark, setDark] = useState(false);
  const [screen, setScreen] = useState('dashboard');
  const [chatOpen, setChatOpen] = useState(false);
  const [cmdOpen, setCmdOpen] = useState(false);
  const [sideExp, setSideExp] = useState(true);
  const [selBill, setSelBill] = useState(null);
  const [selLeg, setSelLeg] = useState(null);
  const [selClient, setSelClient] = useState(null);
  const [alertsOpen, setAlertsOpen] = useState(false);
  const [mobileNav, setMobileNav] = useState(false);

  // Theme classes
  const t = dark ? {
    bg:'bg-warm-950', bgCard:'bg-warm-900/80', bgCard2:'bg-warm-800/50',
    border:'border-gold-500/10', text:'text-cream-100', textSub:'text-cream-300/70',
    textMuted:'text-cream-400/40', input:'bg-warm-900 border-gold-500/15',
    hover:'hover:bg-warm-800/70', hoverBorder:'hover:border-gold-500/25',
    tableBg:'bg-warm-900/50', tableHover:'hover:bg-warm-800/40',
  } : {
    bg:'bg-cream-50', bgCard:'bg-white', bgCard2:'bg-cream-100/80',
    border:'border-gold-500/15', text:'text-navy-900', textSub:'text-navy-600',
    textMuted:'text-navy-600/50', input:'bg-white border-gold-500/20',
    hover:'hover:bg-cream-100', hoverBorder:'hover:border-gold-400/40',
    tableBg:'bg-white', tableHover:'hover:bg-cream-100',
  };

  // Shared components
  const LvlBadge = ({level}) => {
    const c = { FED:'bg-sky-500/20 text-sky-400', STATE:'bg-gold-500/20 text-gold-500', LOCAL:'bg-sage-500/20 text-sage-500', REG:'bg-violet-500/20 text-violet-400', SF:'bg-sage-500/20 text-sage-500' };
    return <span className={`text-xs px-2 py-0.5 rounded-md font-semibold tracking-wide ${c[level]||'bg-gray-500/20 text-gray-400'}`}>{level}</span>;
  };

  const HealthDot = ({score}) => {
    const c = score > 80 ? 'bg-sage-500' : score > 60 ? 'bg-gold-500' : 'bg-coral-500';
    return <div className={`w-3 h-3 rounded-full ${c}`} title={`Health: ${score}`}></div>;
  };

  const ProgressBar = ({pct, color='bg-gold-500', h='h-2'}) => (
    <div className={`${h} rounded-full ${dark?'bg-warm-800':'bg-cream-200'} overflow-hidden`}>
      <div className={`${h} ${color} rounded-full bar-grow`} style={{width:`${pct}%`}}></div>
    </div>
  );

  const MiniChart = ({data, color='#EDAE49', h=40}) => {
    const max = Math.max(...data);
    const min = Math.min(...data);
    const range = max - min || 1;
    const pts = data.map((v,i) => `${(i/(data.length-1))*100},${100-((v-min)/range)*80}`).join(' ');
    return (
      <svg viewBox="0 0 100 100" className="w-full" style={{height:h}} preserveAspectRatio="none">
        <polyline fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" points={pts}/>
        <polyline fill={`${color}20`} stroke="none" points={`0,100 ${pts} 100,100`}/>
      </svg>
    );
  };

  const BarChart = ({items}) => (
    <div className="space-y-3">
      {items.map((it,i) => (
        <div key={i}>
          <div className="flex justify-between text-sm mb-1">
            <span className={t.textSub}>{it.label}</span>
            <span className={`font-semibold ${t.text}`}>{it.value}</span>
          </div>
          <ProgressBar pct={it.pct} color={it.color||'bg-gold-500'} />
        </div>
      ))}
    </div>
  );

  // ===================== DASHBOARD =====================
  const Dashboard = () => (
    <div className="space-y-6 fade-in">
      <div className="flex items-center justify-between">
        <div>
          <h1 className={`text-2xl md:text-3xl font-display font-bold ${t.text}`}>Good morning, Sarah</h1>
          <p className={`${t.textSub} mt-1`}>Wednesday, March 8 · 7 new items since yesterday</p>
        </div>
        <div className="flex items-center gap-2 md:gap-3 overflow-x-auto">
          <button onClick={()=>setChatOpen(true)} className="bg-gradient-to-r from-gold-500 via-ember-400 to-coral-400 text-navy-900 px-5 py-2.5 rounded-2xl font-semibold transition-all hover:shadow-lg hover:shadow-gold-500/20 hover:scale-105">✨ What should I focus on?</button>
        </div>
      </div>

      {/* Stats Row */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
        {[
          { label:'Bills Tracked', val:'82', delta:'+3', spark:[40,42,38,45,50,55,58,62,68,72,78,82], color:'text-gold-500' },
          { label:'Urgent Items', val:'5', delta:'-2', spark:[12,10,8,9,7,6,8,5,6,5,4,5], color:'text-coral-500' },
          { label:'Reports Ready', val:'3', delta:'+1', spark:[0,1,0,2,1,2,3,2,3,2,3,3], color:'text-sage-500' },
          { label:'Win Rate', val:'73%', delta:'+5%', spark:[55,58,62,60,65,68,64,70,69,72,71,73], color:'text-violet-500' },
        ].map((s,i) => (
          <div key={i} className={`${t.bgCard} border ${t.border} rounded-2xl p-5 ${t.hover} transition-all cursor-pointer group`}>
            <p className={`text-sm ${t.textSub}`}>{s.label}</p>
            <div className="flex items-end justify-between mt-1">
              <p className={`text-2xl md:text-3xl font-display font-bold ${t.text}`}>{s.val}</p>
              <span className={`text-xs font-semibold ${s.color}`}>{s.delta}</span>
            </div>
            <div className="mt-3 opacity-60 group-hover:opacity-100 transition-opacity"><MiniChart data={s.spark} color={s.color.includes('gold')?'#EDAE49':s.color.includes('coral')?'#FF6B6B':s.color.includes('sage')?'#7CB892':'#8B5CF6'}/></div>
          </div>
        ))}
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 md:gap-6">
        <div className="lg:col-span-2 space-y-4">
          {/* Live Banner */}
          <div className={`bg-gradient-to-r ${dark?'from-coral-500/15 via-ember-500/10 to-gold-500/10':'from-coral-500/10 via-ember-500/5 to-gold-500/5'} border border-coral-500/25 rounded-2xl p-4 flex items-center justify-between shimmer-bg`}>
            <div className="flex items-center gap-4">
              <div className="flex items-center gap-2">
                <span className="relative flex h-3 w-3"><span className="anim-ping absolute inline-flex h-full w-full rounded-full bg-coral-400 opacity-75"></span><span className="relative inline-flex rounded-full h-3 w-3 bg-coral-500"></span></span>
                <span className="text-coral-500 font-semibold text-sm tracking-wide">LIVE</span>
              </div>
              <div>
                <p className={`${t.text} font-semibold`}>Assembly Housing Committee</p>
                <p className={`${t.textSub} text-sm`}>AB-1234 · 2 clients affected</p>
              </div>
            </div>
            <button onClick={()=>setScreen('live')} className="bg-coral-500 hover:bg-coral-600 text-white px-5 py-2 rounded-xl text-sm font-semibold transition-colors">Watch →</button>
          </div>

          {/* New Bills */}
          <div className={`${t.bgCard} border ${t.border} rounded-2xl overflow-hidden`}>
            <div className={`px-5 py-3 border-b ${t.border} flex items-center justify-between`}>
              <div className="flex items-center gap-2">
                <span className="w-2 h-2 bg-gold-500 rounded-full"></span>
                <span className={`font-semibold ${t.text}`}>New Since Yesterday</span>
                <span className="bg-gold-500/20 text-gold-500 text-xs px-2 py-0.5 rounded-full font-semibold">7</span>
              </div>
              <button onClick={()=>setScreen('bills')} className={`${t.textSub} hover:text-gold-500 text-sm transition-colors`}>View all →</button>
            </div>
            <div className={`divide-y ${dark?'divide-navy-700/40':'divide-cream-200/60'}`}>
              {[
                { level:'STATE',id:'AB-2847',title:'Housing Density Bonus',match:98,client:'CA Housing Coalition' },
                { level:'FED',id:'HR-8821',title:'Water Infrastructure Act',match:64,client:'Central Valley Water' },
                { level:'REG',id:'OAL 2024-0312',title:'Housing Element Guidelines',match:71,client:'CA Housing Coalition' },
                { level:'STATE',id:'SB-1492',title:'Transit-Oriented Development',match:87,client:'Tech Alliance CA' },
              ].map((bill,i) => (
                <div key={i} onClick={()=>{setSelBill(bill);setScreen('bills');}} className={`px-5 py-3.5 ${t.tableHover} transition-colors flex items-center gap-4 cursor-pointer`}>
                  <div className={`w-11 h-11 rounded-xl flex items-center justify-center text-sm font-bold ${bill.match>90?'bg-gradient-to-br from-gold-400 to-gold-500 text-navy-900':'bg-gradient-to-br from-navy-700 to-navy-800 text-cream-300'}`}>{bill.match}%</div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <LvlBadge level={bill.level}/>
                      <span className={`${t.text} font-semibold`}>{bill.id}</span>
                      <span className={t.textMuted}>·</span>
                      <span className={`${t.textSub} truncate`}>{bill.title}</span>
                    </div>
                    <p className={`text-sm ${t.textMuted} mt-0.5`}>Matches: {bill.client}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Today's Calendar */}
          <div className={`${t.bgCard} border ${t.border} rounded-2xl p-5`}>
            <div className="flex items-center justify-between mb-4">
              <span className={`font-semibold ${t.text}`}>Today's Schedule</span>
              <button onClick={()=>setScreen('calendar')} className={`${t.textSub} hover:text-gold-500 text-sm transition-colors`}>Full Calendar →</button>
            </div>
            <div className="space-y-3">
              {[
                { time:'9:00 AM',title:'Assembly Housing Committee',type:'hearing',bills:3 },
                { time:'1:30 PM',title:'Senate Floor Session',type:'floor',bills:12 },
                { time:'3:00 PM',title:'Budget Subcommittee #4',type:'hearing',bills:2 },
              ].map((item,i) => (
                <div key={i} className={`flex items-center gap-4 p-3.5 ${t.bgCard2} rounded-xl ${t.hover} cursor-pointer transition-colors`}>
                  <div className={`text-sm ${t.textSub} w-20 font-medium`}>{item.time}</div>
                  <div className="flex-1">
                    <p className={`${t.text} font-medium`}>{item.title}</p>
                    <p className={`text-sm ${t.textMuted}`}>{item.bills} bills you track</p>
                  </div>
                  <span className={`text-xs px-2.5 py-1 rounded-lg font-semibold ${item.type==='hearing'?'bg-sky-500/20 text-sky-500':'bg-gold-500/20 text-gold-500'}`}>{item.type}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Client Health */}
        <div className="space-y-4">
          <div className="flex items-center justify-between">
            <h2 className={`font-semibold ${t.text}`}>Client Health</h2>
            <button className="text-gold-500 hover:text-gold-400 text-sm font-semibold">+ New</button>
          </div>
          {[
            { name:'CA Housing Coalition', bills:12, urgent:3, health:62, newSince:2, status:'ready', trend:[70,68,65,60,58,62] },
            { name:'Tech Alliance CA', bills:8, urgent:1, health:85, newSince:1, status:'ready', trend:[75,78,80,82,84,85] },
            { name:'Central Valley Water', bills:5, urgent:0, health:94, newSince:3, status:'draft', trend:[88,90,91,92,93,94] },
          ].map((client,i) => (
            <div key={i} onClick={()=>setSelClient(client)} className={`${t.bgCard} border ${t.border} rounded-2xl p-4 ${t.hoverBorder} transition-all cursor-pointer group`}>
              <div className="flex items-center gap-3 mb-3">
                <div className={`w-11 h-11 rounded-xl flex items-center justify-center font-bold text-white text-lg ${client.health>80?'bg-gradient-to-br from-sage-400 to-sage-600':client.health>60?'bg-gradient-to-br from-gold-400 to-gold-600':'bg-gradient-to-br from-coral-400 to-coral-600'}`}>{client.name.charAt(0)}</div>
                <div className="flex-1">
                  <h3 className={`font-semibold ${t.text}`}>{client.name}</h3>
                  <div className="flex items-center gap-2 mt-0.5">
                    <HealthDot score={client.health}/>
                    <span className={`text-xs ${t.textMuted}`}>Health: {client.health}%</span>
                  </div>
                </div>
                {client.status==='ready'&&<span className="bg-sage-500/20 text-sage-500 text-xs px-2 py-1 rounded-full font-semibold">Ready</span>}
              </div>
              <ProgressBar pct={client.health} color={client.health>80?'bg-sage-500':client.health>60?'bg-gold-500':'bg-coral-500'}/>
              <div className="grid grid-cols-3 gap-2 mt-3">
                <div className={`${t.bgCard2} rounded-lg p-2 text-center`}><p className={`text-lg font-bold ${t.text}`}>{client.bills}</p><p className={`text-xs ${t.textMuted}`}>Bills</p></div>
                <div className={`rounded-lg p-2 text-center ${client.urgent>0?'bg-coral-500/15':''+t.bgCard2}`}><p className={`text-lg font-bold ${client.urgent>0?'text-coral-500':t.text}`}>{client.urgent}</p><p className={`text-xs ${t.textMuted}`}>Urgent</p></div>
                <div className={`rounded-lg p-2 text-center ${client.newSince>0?'bg-gold-500/15':''+t.bgCard2}`}><p className={`text-lg font-bold ${client.newSince>0?'text-gold-500':t.text}`}>+{client.newSince}</p><p className={`text-xs ${t.textMuted}`}>New</p></div>
              </div>
              <div className="mt-3 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                <button className="flex-1 bg-gold-500 hover:bg-gold-600 text-navy-900 py-2 rounded-xl text-sm font-semibold transition-colors">Send</button>
                <button className={`flex-1 ${dark?'bg-warm-800 hover:bg-navy-700':'bg-cream-200 hover:bg-cream-300'} ${t.text} py-2 rounded-xl text-sm font-semibold transition-colors`}>Preview</button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  // ===================== ALL BILLS =====================
  const AllBills = () => (
    <div className="space-y-6 fade-in">
      <div className="flex items-center justify-between">
        <div>
          <h1 className={`text-2xl md:text-3xl font-display font-bold ${t.text}`}>All Bills</h1>
          <p className={`${t.textSub} mt-1`}>82 bills tracked across federal, state, and regulatory</p>
        </div>
        <button className="bg-gold-500 hover:bg-gold-600 text-navy-900 px-5 py-2.5 rounded-xl font-semibold transition-colors">+ Track Bill</button>
      </div>
      <div className="flex items-center gap-2 md:gap-3 overflow-x-auto pb-2">
        <div className={`flex ${dark?'bg-warm-900':'bg-cream-200'} rounded-xl p-1`}>
          {['All','Federal','State','Regulatory'].map((f,i)=>(
            <button key={i} className={`px-4 py-2 rounded-lg text-sm font-semibold transition-colors ${i===0?'bg-gold-500 text-navy-900':`${t.textSub} ${t.hover}`}`}>{f}</button>
          ))}
        </div>
        <select className={`${t.input} rounded-xl px-4 py-2 text-sm ${t.text}`}><option>All Clients</option></select>
        <select className={`${t.input} rounded-xl px-4 py-2 text-sm ${t.text}`}><option>All Positions</option><option>Support</option><option>Oppose</option><option>Watch</option></select>
        <div className="flex-1"/>
        <input type="text" placeholder="Search bills..." className={`${t.input} rounded-xl px-4 py-2 text-sm ${t.text} w-64 outline-none focus:border-gold-500`}/>
      </div>
      <div className={`${t.bgCard} border ${t.border} rounded-2xl overflow-hidden`}>
        <div className="overflow-x-auto"><table className="w-full min-w-[600px]">
          <thead><tr className={`border-b ${t.border} text-left`}>
            {['Bill','Title','Status','Client','Position','Passage Prob','Last Action'].map(h=>(
              <th key={h} className={`px-5 py-3 text-sm font-semibold ${t.textSub}`}>{h}</th>
            ))}
          </tr></thead>
          <tbody className={`divide-y ${dark?'divide-navy-700/40':'divide-cream-200/60'}`}>
            {[
              { level:'STATE',id:'AB-1234',title:'Affordable Housing Act',status:'Floor Vote',client:'CA Housing Coalition',position:'SUPPORT',prob:78,action:'Amended Mar 5' },
              { level:'STATE',id:'AB-2847',title:'Housing Density Bonus',status:'Committee',client:'CA Housing Coalition',position:null,prob:45,action:'Introduced Mar 7' },
              { level:'FED',id:'HR-8821',title:'Water Infrastructure Act',status:'Introduced',client:'Central Valley Water',position:'WATCH',prob:32,action:'Introduced Mar 6' },
              { level:'REG',id:'OAL 2024-0312',title:'Housing Element Guidelines',status:'Comment Period',client:'CA Housing Coalition',position:'SUPPORT',prob:null,action:'Comments due Mar 20' },
              { level:'STATE',id:'SB-567',title:'Housing Element Compliance',status:'Committee',client:'CA Housing Coalition',position:'SUPPORT',prob:65,action:'Hearing Mar 12' },
              { level:'STATE',id:'SB-1492',title:'Transit-Oriented Development',status:'Committee',client:'Tech Alliance CA',position:'SUPPORT',prob:58,action:'Hearing Mar 14' },
              { level:'FED',id:'S-4421',title:'Federal Housing Trust Fund',status:'Subcommittee',client:'CA Housing Coalition',position:'SUPPORT',prob:22,action:'Markup Mar 18' },
            ].map((bill,i) => (
              <tr key={i} onClick={()=>setSelBill(bill)} className={`${t.tableHover} cursor-pointer transition-colors`}>
                <td className="px-5 py-4"><div className="flex items-center gap-2"><LvlBadge level={bill.level}/><span className={`${t.text} font-semibold`}>{bill.id}</span></div></td>
                <td className={`px-5 py-4 ${t.textSub}`}>{bill.title}</td>
                <td className={`px-5 py-4 ${t.textMuted} text-sm`}>{bill.status}</td>
                <td className={`px-5 py-4 ${t.textMuted} text-sm`}>{bill.client||'-'}</td>

                  {[
                    { text:'AB-1234 amended in committee',time:'2h ago',type:'amendment',read:false },
                    { text:'Hearing scheduled: AB-567 Mar 15',time:'4h ago',type:'hearing',read:false },
                    { text:'SB-890 passed Senate floor vote',time:'1d ago',type:'vote',read:true },
                    { text:'OAL comment period opens',time:'1d ago',type:'regulatory',read:true },
                    { text:'New bill match: AB-2847 → CA Housing',time:'2d ago',type:'match',read:true },
                  ].map((a,i)=>(
                    <div key={i} className={`px-4 py-3 flex items-start gap-3 cursor-pointer transition-colors ${!a.read?dark?'bg-gold-500/5':'bg-gold-500/5':''} ${dark?'hover:bg-warm-800/50':'hover:bg-cream-100'} ${i>0?`border-t ${dark?'border-gold-500/5':'border-gold-500/5'}`:''}`}>
                      <div className={`w-8 h-8 rounded-lg flex items-center justify-center shrink-0 mt-0.5 ${a.type==='amendment'?'bg-gold-500/15':a.type==='hearing'?'bg-sky-500/15':a.type==='vote'?'bg-sage-500/15':a.type==='regulatory'?'bg-violet-500/15':'bg-coral-500/15'}`}>
                        <span className="text-sm">{a.type==='amendment'?'📝':a.type==='hearing'?'🏛️':a.type==='vote'?'✅':a.type==='regulatory'?'📜':'🔔'}</span>
                      </div>
                      <div className="flex-1 min-w-0">
                        <p className={`text-sm ${!a.read?`font-semibold ${t.text}`:t.textSub}`}>{a.text}</p>
                        <p className={`text-xs ${t.textMuted} mt-0.5`}>{a.time}</p>
                      </div>
                      {!a.read&&<span className="w-2 h-2 bg-gold-500 rounded-full mt-2 shrink-0"/>}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* Theme toggle */}
          <button onClick={()=>setDark(!dark)} className={`p-2.5 rounded-xl shrink-0 ${t.bgCard} border ${t.border} ${t.hover} transition-all hidden sm:block`} title="Toggle theme">
            <span className="text-lg">{dark?'☀️':'🌙'}</span>
          </button>
        </div>

        {/* AI Context Strip */}
        {!chatOpen && (
          <div className={`px-3 md:px-6 py-2 flex items-center gap-3 cursor-pointer transition-all ${dark?'bg-gradient-to-r from-gold-500/5 via-ember-500/5 to-violet-500/5 hover:from-gold-500/10 hover:via-ember-500/10 hover:to-violet-500/10':'bg-gradient-to-r from-gold-500/5 via-ember-500/5 to-violet-500/5 hover:from-gold-500/10 hover:via-ember-500/10 hover:to-violet-500/10'} border-b ${t.border}`} onClick={()=>setChatOpen(true)}>
            <span className="text-sm">✨</span>
            <span className={`text-xs ${dark?'text-gold-400/70':'text-gold-600/70'} truncate`}>3 items need attention · AB-1234 floor vote today · 2 new bill matches</span>
            <span className={`text-xs ${dark?'text-gold-500':'text-gold-600'} font-semibold ml-auto shrink-0`}>Ask AI →</span>
          </div>
        )}

        <div className="flex-1 p-4 md:p-8 overflow-auto" onClick={()=>alertsOpen&&setAlertsOpen(false)}>
          <div className="max-w-7xl mx-auto">{renderScreen()}</div>
        </div>
      </div>

      <CommandPalette/>
      <ChatPanel/>
      {selClient&&<ClientDetailModal/>}
    </div>
  );
};

ReactDOM.render(<App/>, document.getElementById('root'));
  </script>
</body>
</html>
