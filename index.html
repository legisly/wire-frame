<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legisly - Complete Product Wireframes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }
    .animate-ping { animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const LegislyComplete = () => {
      const [activeScreen, setActiveScreen] = useState('dashboard');
      const [chatOpen, setChatOpen] = useState(false);
      const [commandOpen, setCommandOpen] = useState(false);
      const [sidebarExpanded, setSidebarExpanded] = useState(true);
      const [selectedClient, setSelectedClient] = useState(null);
      const [selectedBill, setSelectedBill] = useState(null);
      const [selectedLegislator, setSelectedLegislator] = useState(null);
      const [portalView, setPortalView] = useState(false);

      const LevelBadge = ({ level }) => {
        const colors = {
          'FED': 'bg-blue-500/20 text-blue-400',
          'STATE': 'bg-amber-500/20 text-amber-400',
          'LOCAL': 'bg-emerald-500/20 text-emerald-400',
          'SF': 'bg-emerald-500/20 text-emerald-400',
          'REG': 'bg-purple-500/20 text-purple-400',
        };
        return <span className={`text-xs px-2 py-0.5 rounded font-medium ${colors[level] || 'bg-slate-700 text-slate-400'}`}>{level}</span>;
      };

      // ==================== DASHBOARD ====================
      const Dashboard = () => (
        <div className="space-y-6">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-3xl font-bold text-white">Good morning, Sarah</h1>
              <p className="text-slate-400 mt-1">Wednesday, March 8 · 7 new items since yesterday</p>
            </div>
            <button onClick={() => setCommandOpen(true)} className="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl text-slate-400 transition-colors">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
              <span className="text-sm">Search...</span>
              <kbd className="text-xs bg-slate-700 px-1.5 py-0.5 rounded">⌘K</kbd>
            </button>
          </div>

          <div className="grid grid-cols-3 gap-6">
            <div className="col-span-2 space-y-4">
              {/* Live Banner */}
              <div className="bg-gradient-to-r from-red-500/20 to-orange-500/20 border border-red-500/30 rounded-2xl p-4 flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <div className="flex items-center gap-2">
                    <span className="relative flex h-3 w-3">
                      <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                      <span className="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                    </span>
                    <span className="text-red-400 font-semibold text-sm">LIVE</span>
                  </div>
                  <div>
                    <p className="text-white font-medium">Assembly Housing Committee</p>
                    <p className="text-slate-400 text-sm">AB-1234 · 2 clients affected</p>
                  </div>
                </div>
                <button onClick={() => setActiveScreen('live')} className="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-xl text-sm font-medium transition-colors">Watch →</button>
              </div>

              {/* New Bills */}
              <div className="bg-slate-800/50 border border-slate-700 rounded-2xl overflow-hidden">
                <div className="px-5 py-3 border-b border-slate-700 flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <span className="w-2 h-2 bg-orange-500 rounded-full"></span>
                    <span className="font-medium text-white">New Since Yesterday</span>
                    <span className="bg-orange-500/20 text-orange-400 text-xs px-2 py-0.5 rounded-full">7</span>
                  </div>
                  <button onClick={() => setActiveScreen('bills')} className="text-slate-400 hover:text-white text-sm transition-colors">View all →</button>
                </div>
                <div className="divide-y divide-slate-700/50">
                  {[
                    { level: 'STATE', id: 'AB-2847', title: 'Housing Density Bonus', match: 98, client: 'CA Housing Coalition' },
                    { level: 'FED', id: 'HR-8821', title: 'Water Infrastructure Act', match: 64, client: 'Central Valley Water' },
                    { level: 'REG', id: 'OAL 2024-0312', title: 'Housing Element Guidelines', match: 71, client: 'CA Housing Coalition' },
                  ].map((bill, i) => (
                    <div key={i} onClick={() => { setSelectedBill(bill); setActiveScreen('bills'); }} className="px-5 py-3 hover:bg-slate-700/30 transition-colors flex items-center gap-4 cursor-pointer">
                      <div className={`w-10 h-10 rounded-lg flex items-center justify-center text-sm font-bold ${bill.match > 90 ? 'bg-gradient-to-br from-orange-500 to-amber-500 text-white' : 'bg-slate-700 text-slate-300'}`}>{bill.match}%</div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2">
                          <LevelBadge level={bill.level} />
                          <span className="text-white font-medium">{bill.id}</span>
                          <span className="text-slate-500">·</span>
                          <span className="text-slate-400 truncate">{bill.title}</span>
                        </div>
                        {bill.client && <p className="text-sm text-slate-500 mt-0.5">Matches: {bill.client}</p>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Today's Calendar */}
              <div className="bg-slate-800/50 border border-slate-700 rounded-2xl p-5">
                <div className="flex items-center justify-between mb-4">
                  <span className="font-medium text-white">Today's Schedule</span>
                  <button onClick={() => setActiveScreen('calendar')} className="text-slate-400 hover:text-white text-sm transition-colors">Full Calendar →</button>
                </div>
                <div className="space-y-3">
                  {[
                    { time: '9:00 AM', title: 'Assembly Housing Committee', type: 'hearing', bills: 3 },
                    { time: '1:30 PM', title: 'Senate Floor Session', type: 'floor', bills: 12 },
                    { time: '3:00 PM', title: 'Budget Subcommittee #4', type: 'hearing', bills: 2 },
                  ].map((item, i) => (
                    <div key={i} className="flex items-center gap-4 p-3 bg-slate-700/30 rounded-xl hover:bg-slate-700/50 cursor-pointer transition-colors">
                      <div className="text-sm text-slate-400 w-20">{item.time}</div>
                      <div className="flex-1">
                        <p className="text-white font-medium">{item.title}</p>
                        <p className="text-sm text-slate-500">{item.bills} bills you track</p>
                      </div>
                      <span className={`text-xs px-2 py-1 rounded ${item.type === 'hearing' ? 'bg-blue-500/20 text-blue-400' : 'bg-amber-500/20 text-amber-400'}`}>{item.type}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Client Reports */}
            <div className="space-y-4">
              <div className="flex items-center justify-between">
                <h2 className="font-semibold text-white">Client Reports</h2>
                <button className="text-orange-400 hover:text-orange-300 text-sm font-medium">+ New</button>
              </div>
              {[
                { name: 'CA Housing Coalition', bills: 12, urgent: 3, newSince: 2, status: 'ready', health: 'attention' },
                { name: 'Tech Alliance CA', bills: 8, urgent: 1, newSince: 1, status: 'ready', health: 'good' },
                { name: 'Central Valley Water', bills: 5, urgent: 0, newSince: 3, status: 'draft', health: 'great' },
              ].map((client, i) => (
                <div key={i} onClick={() => setSelectedClient(client)} className="bg-slate-800/50 border border-slate-700 rounded-2xl p-4 hover:border-slate-600 transition-all cursor-pointer group">
                  <div className="flex items-center gap-3 mb-3">
                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-bold text-white ${client.health === 'great' ? 'bg-gradient-to-br from-emerald-500 to-green-600' : client.health === 'good' ? 'bg-gradient-to-br from-blue-500 to-indigo-600' : 'bg-gradient-to-br from-amber-500 to-orange-600'}`}>{client.name.charAt(0)}</div>
                    <div className="flex-1">
                      <h3 className="font-medium text-white">{client.name}</h3>
                    </div>
                    {client.status === 'ready' && <span className="bg-green-500/20 text-green-400 text-xs px-2 py-1 rounded-full">Ready</span>}
                  </div>
                  <div className="grid grid-cols-3 gap-2">
                    <div className="bg-slate-700/50 rounded-lg p-2 text-center">
                      <p className="text-lg font-bold text-white">{client.bills}</p>
                      <p className="text-xs text-slate-500">Bills</p>
                    </div>
                    <div className={`rounded-lg p-2 text-center ${client.urgent > 0 ? 'bg-red-500/20' : 'bg-slate-700/50'}`}>
                      <p className={`text-lg font-bold ${client.urgent > 0 ? 'text-red-400' : 'text-white'}`}>{client.urgent}</p>
                      <p className="text-xs text-slate-500">Urgent</p>
                    </div>
                    <div className={`rounded-lg p-2 text-center ${client.newSince > 0 ? 'bg-orange-500/20' : 'bg-slate-700/50'}`}>
                      <p className={`text-lg font-bold ${client.newSince > 0 ? 'text-orange-400' : 'text-white'}`}>+{client.newSince}</p>
                      <p className="text-xs text-slate-500">New</p>
                    </div>
                  </div>
                  <div className="mt-3 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button className="flex-1 bg-orange-500 hover:bg-orange-600 text-white py-2 rounded-xl text-sm font-medium transition-colors">Send</button>
                    <button className="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-xl text-sm font-medium transition-colors">Preview</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );

      // ==================== ALL BILLS ====================
      const AllBills = () => (
        <div className="space-y-6">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-3xl font-bold text-white">All Bills</h1>
              <p className="text-slate-400 mt-1">82 bills tracked across federal, state, and regulatory</p>
            </div>
            <button className="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-xl font-medium transition-colors">+ Track Bill</button>
          </div>

          <div className="flex items-center gap-3 flex-wrap">
            <div className="flex bg-slate-800 rounded-xl p-1">
              {['All', 'Federal', 'State', 'Regulatory'].map((filter, i) => (
                <button key={i} className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${i === 0 ? 'bg-orange-500 text-white' : 'text-slate-400 hover:text-white'}`}>{filter}</button>
              ))}
            </div>
            <select className="bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-2 text-sm">
              <option>All Clients</option>
              <option>CA Housing Coalition</option>
            </select>
            <select className="bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-2 text-sm">
              <option>All Positions</option>
              <option>Support</option>
              <option>Oppose</option>
              <option>Watch</option>
              <option>Neutral</option>
            </select>
            <div className="flex-1"></div>
            <input type="text" placeholder="Search bills..." className="bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-2 text-sm w-64 outline-none focus:border-orange-500" />
          </div>

          <div className="bg-slate-800/50 border border-slate-700 rounded-2xl overflow-hidden">
            <table className="w-full">
              <thead>
                <tr className="border-b border-slate-700 text-left">
                  <th className="px-5 py-3 text-sm font-medium text-slate-400">Bill</th>
                  <th className="px-5 py-3 text-sm font-medium text-slate-400">Title</th>
                  <th className="px-5 py-3 text-sm font-medium text-slate-400">Status</th>
                  <th className="px-5 py-3 text-sm font-medium text-slate-400">Client</th>
                  <th className="px-5 py-3 text-sm font-medium text-slate-400">Position</th>
                  <th className="px-5 py-3 text-sm font-medium text-slate-400">Last Action</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-700/50">
                {[
                  { level: 'STATE', id: 'AB-1234', title: 'Affordable Housing Act', status: 'Floor Vote', client: 'CA Housing Coalition', position: 'SUPPORT', action: 'Amended Mar 5' },
                  { level: 'STATE', id: 'AB-2847', title: 'Housing Density Bonus', status: 'Committee', client: 'CA Housing Coalition', position: null, action: 'Introduced Mar 7' },
                  { level: 'FED', id: 'HR-8821', title: 'Water Infrastructure Act', status: 'Introduced', client: 'Central Valley Water', position: 'WATCH', action: 'Introduced Mar 6' },
                  { level: 'REG', id: 'OAL 2024-0312', title: 'Housing Element Guidelines', status: 'Comment Period', client: 'CA Housing Coalition', position: 'SUPPORT', action: 'Comments due Mar 20' },
                  { level: 'STATE', id: 'SB-567', title: 'Housing Element Compliance', status: 'Committee', client: 'CA Housing Coalition', position: 'SUPPORT', action: 'Hearing Mar 12' },
                ].map((bill, i) => (
                  <tr key={i} onClick={() => setSelectedBill(bill)} className="hover:bg-slate-700/30 cursor-pointer transition-colors">
                    <td className="px-5 py-4">
                      <div className="flex items-center gap-2">
                        <LevelBadge level={bill.level} />
                        <span className="text-white font-medium">{bill.id}</span>
                      </div>
                    </td>
                    <td className="px-5 py-4 text-slate-300">{bill.title}</td>
                    <td className="px-5 py-4 text-slate-400 text-sm">{bill.status}</td>
                    <td className="px-5 py-4 text-slate-400 text-sm">{bill.client || '-'}</td>
                    <td className="px-5 py-4">
                      {bill.position ? (
                        <span className={`text-xs px-2 py-1 rounded ${bill.position === 'SUPPORT' ? 'bg-green-500/20 text-green-400' : bill.position === 'OPPOSE' ? 'bg-red-500/20 text-red-400' : 'bg-slate-700 text-slate-400'}`}>{bill.position}</span>
                      ) : (
                        <button className="text-xs text-orange-400 hover:text-orange-300">Set position</button>
                      )}
                    </td>
                    <td className="px-5 py-4 text-slate-500 text-sm">{bill.action}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );

      // ==================== BILL DETAIL ====================
      const BillDetail = () => (
        <div className="space-y-6">
          <button onClick={() => setSelectedBill(null)} className="text-slate-400 hover:text-white transition-colors flex items-center gap-2">← Back to Bills</button>

          <div className="bg-gradient-to-r from-amber-500/10 to-orange-500/10 border border-amber-500/20 rounded-2xl p-6">
            <div className="flex items-start justify-between">
              <div>
                <div className="flex items-center gap-3 mb-2">
                  <LevelBadge level="STATE" />
                  <span className="text-slate-400">California Legislature</span>
                </div>
                <h1 className="text-3xl font-bold text-white">AB-1234</h1>
                <p className="text-xl text-slate-400 mt-1">Affordable Housing Act of 2026</p>
              </div>
              <div className="flex gap-2">
                <button className="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-xl font-medium transition-colors">+ Add to Client</button>
                <button className="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-xl font-medium transition-colors">Generate Summary</button>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-3 gap-6">
            <div className="col-span-2 space-y-6">
              {/* Status */}
              <div className="bg-slate-800/50 border border-slate-700 rounded-2xl p-6">
                <h2 className="font-semibold text-white mb-4">Status</h2>
                <div className="flex items-center justify-between">
                  {['Introduced', 'Committee', 'Floor Vote', 'Other House', 'Governor'].map((step, i) => (
                    <div key={i} className="flex flex-col items-center">
                      <div className={`w-10 h-10 rounded-full flex items-center justify-center font-medium ${i < 2 ? 'bg-green-500 text-white' : i === 2 ? 'bg-amber-500 text-white ring-4 ring-amber-500/30' : 'bg-slate-700 text-slate-500'}`}>{i < 2 ? '✓' : i + 1}</div>
                      <p className={`mt-2 text-sm ${i === 2 ? 'text-amber-400 font-medium' : 'text-slate-500'}`}>{step}</p>
                    </div>
                  ))}
                </div>
              </div>

              {/* AI Summary */}
              <div className="bg-purple-500/10 border border-purple-500/20 rounded-2xl p-6">
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-xl">✨</span>
                  <h2 className="font-semibold text-purple-300">AI Summary</h2>
                </div>
                <p className="text-purple-200 leading-relaxed">This bill requires cities over 100,000 population to zone for increased housing density near transit stations. Key provisions include streamlined permitting, density bonuses for 20%+ affordable units, and override of parking minimums.</p>
              </div>

              {/* Position Notes */}
              <div className="bg-slate-800/50 border border-slate-700 rounded-2xl p-6">
                <h2 className="font-semibold text-white mb-4">Position Notes by Client</h2>
                <div className="space-y-4">
                  <div className="p-4 bg-green-500/10 border border-green-500/20 rounded-xl">
                    <div className="flex items-center justify-between mb-2">
                      <span className="font-medium text-white">CA Housing Coalition</span>
                      <span className="bg-green-500 text-white text-xs px-2 py-1 rounded">SUPPORT</span>
                    </div>
                    <p className="text-slate-300 text-sm">Strong support - aligns with our density agenda. Key win for coalition members in transit-rich areas. Prepared testimony for Mar 12 hearing.</p>
                    <p className="text-slate-500 text-xs mt-2">Last updated by Sarah Chen · Mar 5, 2026</p>
                  </div>
                  <div className="p-4 bg-red-500/10 border border-red-500/20 rounded-xl">
                    <div className="flex items-center justify-between mb-2">
                      <span className="font-medium text-white">Bay Area Builders</span>
                      <span className="bg-red-500 text-white text-xs px-2 py-1 rounded">OPPOSE</span>
                    </div>
                    <p className="text-slate-300 text-sm">Concerns about parking elimination and density requirements. Working on amendments to address member concerns.</p>
                    <p className="text-slate-500 text-xs mt-2">Last updated by Sarah Chen · Mar 3, 2026</p>
                  </div>
                </div>
                <button className="mt-4 text-orange-400 hover:text-orange-300 text-sm font-medium">+ Add position note</button>
              </div>
            </div>

            {/* Sidebar */}
            <div className="space-y-6">
              <div className="bg-slate-800/50 border border-slate-700 rounded-2xl p-5">
                <h2 className="font-semibold text-white mb-4">Author</h2>
                <div onClick={() => { setSelectedLegislator({ name: 'Asm. Smith', party: 'D', district: 'AD-42' }); setActiveScreen('legislators'); }} className="flex items-center gap-3 p-3 bg-slate-700/50 rounded-xl hover:bg-slate-700 cursor-pointer transition-colors">
                  <div className="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">S</div>
                  <div>
                    <p className="text-white font-medium">Asm. Jane Smith</p>
                    <p className="text-slate-400 text-sm">D - District 42</p>
                  </div>
                </div>
              </div>

              <div className="bg-slate-800/50 border border-slate-700 rounded-2xl p-5">
                <h2 className="font-semibold text-white mb-4">Key Info</h2>
                <div className="space-y-3 text-sm">
                  <div className="flex justify-between"><span className="text-slate-500">Committee</span><span className="text-white">Housing & CD</span></div>
                  <div className="flex justify-between"><span className="text-slate-500">Next Action</span><span className="text-orange-400">Floor vote Mar 12</span></div>
                  <div className="flex justify-between"><span className="text-slate-500">Co-authors</span><span className="text-white">12 members</span></div>
                </div>
              </div>

              <div className="bg-slate-800/50 border border-slate-700 rounded-2xl p-5">
                <h2 className="font-semibold text-white mb-4">Stakeholders</h2>
                <div className="space-y-2">
                  {['Maria Chen (Housing Coalition)', 'Tom Davis (Committee Staff)', 'Rep. Johnson Office'].map((contact, i) => (
                    <div key={i} className="p-2 bg-slate-700/50 rounded-lg text-sm text-slate-300 hover:bg-slate-700 cursor-pointer transition-colors">{contact}</div>
                  ))}
                </div>
                <button className="mt-3 text-orange-400 hover:text-orange-300 text-sm font-medium">View in CRM →</button>
              </div>
            </div>
          </div>
        </div>
      );

      // ==================== CALENDAR ====================
      const Calendar = () => (
        <div className="space-y-6">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-3xl font-bold text-white">Calendar</h1>
              <p className="text-slate-400 mt-1">Hearings, floor sessions, and deadlines</p>
            </div>
            <div className="flex items-center gap-2">
              <button className="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-xl font-medium transition-colors">← Prev</button>
              <span className="text-white font-medium px-4">March 2026</span>
              <button className="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-xl font-medium transition-colors">Next →</button>
            </div>
          </div>

          {/* Week View */}
          <div className="bg-slate-800/50 border border-slate-700 rounded-2xl overflow-hidden">
            <div className="grid grid-cols-7 border-b border-slate-700">
              {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map((day, i) => (
                <div key={i} className="px-4 py-3 text-center text-sm font-medium text-slate-400 border-r border-slate-700 last:border-r-0">{day}</div>
              ))}
            </div>
            <div className="grid grid-cols-7">
              {[8, 9, 10, 11, 12, 13, 14].map((date, i) => (
                <div key={i} className={`min-h-32 p-2 border-r border-b border-slate-700 last:border-r-0 ${i === 3 ? 'bg-orange-500/10' : ''}`}>
                  <p className={`text-sm font-medium mb-2 ${i === 3 ? 'text-orange-400' : 'text-slate-400'}`}>{date}</p>
                  {i === 3 && (
                    <div className="space-y-1">
                      <div className="p-1.5 bg-blue-500/20 rounded text-xs text-blue-400 truncate">9:00 Housing Cmte</div>
                      <div className="p-1.5 bg-amber-500/20 rounded text-xs text-amber-400 truncate">1:30 Floor Session</div>
                    </div>
                  )}
                  {i === 4 && (
                    <div className="space-y-1">
                      <div className="p-1.5 bg-blue-500/20 rounded text-xs text-blue-400 truncate">10:00 Budget Sub</div>
                    </div>
                  )}
                  {i === 5 && (
                    <div className="space-y-1">
                      <div className="p-1.5 bg-red-500/20 rounded text-xs text-red-400 truncate">AB-1234 Deadline</div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>

          {/* Today's Detail */}

                <h2 className="text-xl font-bold text-white">{selectedClient?.name}</h2>
              </div>
              <button className="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-xl font-medium">Send Report</button>
            </div>
            <div className="p-6 space-y-6">
              <div className="bg-gradient-to-r from-orange-500/10 to-amber-500/10 border border-orange-500/20 rounded-2xl p-5">
                <h3 className="font-semibold text-white mb-3">Changes Since Last Report</h3>
                <div className="grid grid-cols-4 gap-4 text-center">
                  <div><p className="text-2xl font-bold text-orange-400">+2</p><p className="text-xs text-slate-400">New</p></div>
                  <div><p className="text-2xl font-bold text-amber-400">4</p><p className="text-xs text-slate-400">Amended</p></div>
                  <div><p className="text-2xl font-bold text-green-400">1</p><p className="text-xs text-slate-400">Passed</p></div>
                  <div><p className="text-2xl font-bold text-red-400">3</p><p className="text-xs text-slate-400">Urgent</p></div>
                </div>
              </div>
              <div className="bg-purple-500/10 border border-purple-500/20 rounded-2xl p-5">
                <div className="flex items-center gap-2 mb-3">
                  <span>✨</span>
                  <h3 className="font-semibold text-purple-300">AI Summary</h3>
                </div>
                <p className="text-purple-200 text-sm">AB-1234 passed committee. Two new bills align with priorities. Budget reduced housing funding 14%.</p>
              </div>
            </div>
          </div>
        </div>
      );

      const CommandPalette = () => (
        <div className={`fixed inset-0 z-50 ${commandOpen ? 'block' : 'hidden'}`}>
          <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setCommandOpen(false)}></div>
          <div className="absolute top-1/4 left-1/2 -translate-x-1/2 w-full max-w-2xl">
            <div className="bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl overflow-hidden">
              <div className="flex items-center gap-4 p-4 border-b border-slate-700">
                <svg className="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                <input type="text" placeholder="Search or ask AI..." className="flex-1 bg-transparent text-white text-lg outline-none placeholder-slate-500" autoFocus />
                <kbd className="px-2 py-1 bg-slate-800 rounded text-xs text-slate-500">ESC</kbd>
              </div>
              <div className="p-2">
                {['Generate all reports', 'Send pending reports', 'Search bills', 'View calendar'].map((action, i) => (
                  <button key={i} className="w-full flex items-center gap-3 px-3 py-3 hover:bg-slate-800 rounded-xl text-white text-left">{action}</button>
                ))}
              </div>
            </div>
          </div>
        </div>
      );

      const ChatPanel = () => (
        <div className={`fixed right-0 top-0 h-full w-96 bg-slate-900 border-l border-slate-800 transform transition-transform duration-300 z-40 ${chatOpen ? 'translate-x-0' : 'translate-x-full'}`}>
          <div className="bg-gradient-to-r from-orange-500 to-amber-500 p-4 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">✨</div>
              <div>
                <h3 className="font-semibold text-white">Legisly AI</h3>
                <p className="text-sm text-orange-100">Ask anything</p>
              </div>
            </div>
            <button onClick={() => setChatOpen(false)} className="text-white hover:bg-white/10 p-2 rounded-lg">✕</button>
          </div>
          <div className="p-4">
            <div className="bg-slate-800 rounded-2xl p-4 text-slate-300 text-sm">Hi! How can I help you today?</div>
          </div>
          <div className="absolute bottom-0 left-0 right-0 p-4 border-t border-slate-800">
            <div className="flex gap-2">
              <input placeholder="Ask anything..." className="flex-1 px-4 py-3 bg-slate-800 rounded-xl text-white text-sm outline-none" />
              <button className="p-3 bg-orange-500 hover:bg-orange-600 text-white rounded-xl">→</button>
            </div>
          </div>
        </div>
      );

      // ==================== SIDEBAR ====================
      const navItems = [
        { id: 'dashboard', label: 'Dashboard', icon: '⬡' },
        { id: 'bills', label: 'Bills', icon: '☰' },
        { id: 'calendar', label: 'Calendar', icon: '📅' },
        { id: 'legislators', label: 'Legislators', icon: '👤' },
        { id: 'live', label: 'Live', icon: '◉', live: true },
        { id: 'clients', label: 'Clients', icon: '◎' },
        { id: 'crm', label: 'CRM', icon: '📇' },
        { id: 'regulatory', label: 'Regulatory', icon: '📜' },
        { id: 'alerts', label: 'Alerts', icon: '🔔' },
        { id: 'budget', label: 'Budget', icon: '💰' },
        { id: 'fppc', label: 'FPPC', icon: '📋' },
        { id: 'reports', label: 'Reports', icon: '📊' },
      ];

      const renderScreen = () => {
        if (portalView) return <ClientPortal />;
        if (selectedBill) return <BillDetail />;
        if (selectedLegislator) return <LegislatorDetail />;
        switch(activeScreen) {
          case 'dashboard': return <Dashboard />;
          case 'bills': return <AllBills />;
          case 'calendar': return <Calendar />;
          case 'legislators': return <Legislators />;
          case 'live': return <LiveHearings />;
          case 'clients': return <Clients />;
          case 'crm': return <StakeholderCRM />;
          case 'regulatory': return <Regulatory />;
          case 'alerts': return <Alerts />;
          case 'budget': return <Budget />;
          case 'fppc': return <FPPC />;
          case 'reports': return <Reports />;
          case 'onboarding': return <Onboarding />;
          case 'migration': return <DataMigration />;
          default: return <Dashboard />;
        }
      };

      if (portalView) return <ClientPortal />;

      return (
        <div className="min-h-screen bg-slate-950 flex">
          <div className={`${sidebarExpanded ? 'w-56' : 'w-20'} bg-slate-900 border-r border-slate-800 flex flex-col transition-all`}>
            <div className="p-4 flex items-center gap-3">
              <div className="w-10 h-10 bg-gradient-to-br from-orange-500 to-amber-500 rounded-xl flex items-center justify-center">
                <span className="text-white font-bold text-lg">L</span>
              </div>
              {sidebarExpanded && <span className="text-xl font-bold text-amber-400">legisly</span>}
            </div>

            <nav className="flex-1 px-3 py-2 space-y-1 overflow-y-auto">
              {navItems.map(item => (
                <button
                  key={item.id}
                  onClick={() => { setActiveScreen(item.id); setSelectedBill(null); setSelectedLegislator(null); }}
                  className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all ${activeScreen === item.id ? 'bg-orange-500 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}
                >
                  <span className="text-lg relative">
                    {item.icon}
                    {item.live && <span className="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>}
                  </span>
                  {sidebarExpanded && <span className="font-medium text-sm">{item.label}</span>}
                </button>
              ))}
              
              {sidebarExpanded && <div className="border-t border-slate-800 my-3"></div>}
              
              <button onClick={() => setActiveScreen('onboarding')} className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:text-white hover:bg-slate-800 transition-all">
                <span className="text-lg">⚙️</span>
                {sidebarExpanded && <span className="font-medium text-sm">Setup</span>}
              </button>
              <button onClick={() => setActiveScreen('migration')} className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:text-white hover:bg-slate-800 transition-all">
                <span className="text-lg">📤</span>
                {sidebarExpanded && <span className="font-medium text-sm">Import Data</span>}
              </button>
            </nav>

            <div className="p-3 border-t border-slate-800">
              <button onClick={() => setChatOpen(!chatOpen)} className={`w-full flex items-center gap-3 px-3 py-3 rounded-xl ${chatOpen ? 'bg-gradient-to-r from-orange-500 to-amber-500 text-white' : 'bg-slate-800 text-amber-400 hover:bg-slate-700'}`}>
                <span className="text-xl">✨</span>
                {sidebarExpanded && <span className="font-medium">AI Assistant</span>}
              </button>
            </div>

            <div className="p-4 border-t border-slate-800">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-white font-semibold">S</div>
                {sidebarExpanded && <div><p className="text-white font-medium text-sm">Sarah Chen</p><p className="text-slate-500 text-xs">Admin</p></div>}
              </div>
            </div>
          </div>

          <div className="flex-1 p-8 overflow-auto">
            <div className="max-w-7xl mx-auto">
              {renderScreen()}
            </div>
          </div>

          <CommandPalette />
          <ChatPanel />
          {selectedClient && <ClientDetail />}
        </div>
      );
    };

    ReactDOM.render(<LegislyComplete />, document.getElementById('root'));
  </script>
</body>
</html>
